  - suite: "Cross-cutting edge cases"
    cases:
      - id: "EDGE-001"
        priority: ["regression"]
        surface: ["UI", "API"]
        tool: "auto"
        automation_target: "add"
        scenario: "Backend unavailable -> frontend demo fallback or controlled error"
        preconditions:
          - "Backend отключён или отвечает HTML"
        steps:
          - "Вызвать ключевые apiFetch сценарии"
        expected:
          - "demoFallback включается только для поддержанных путей"
          - "Пользователь получает controlled state"
        acceptance_criteria:
          - "Нет silent crash в SPA"

      - id: "EDGE-002"
        priority: ["regression"]
        surface: ["API"]
        tool: "auto"
        automation_target: "add"
        scenario: "Invalid JSON / unsupported provider / missing ids"
        preconditions:
