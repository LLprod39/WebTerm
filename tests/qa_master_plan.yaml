meta:
  title: "WEU AI Platform master QA plan"
  version: "1.0"
  last_updated: "2026-03-19"
  objective: "Единый тест-план для UI, API, CLI, WebSocket, desktop API и интеграций."
  source_of_truth:
    - "C:/WebTrerm/AGENTS.md"
    - "C:/WebTrerm/web_ui/settings.py"
    - "C:/WebTrerm/web_ui/urls.py"
    - "C:/WebTrerm/core_ui/urls.py"
    - "C:/WebTrerm/core_ui/desktop_api/urls.py"
    - "C:/WebTrerm/servers/urls.py"
    - "C:/WebTrerm/studio/urls.py"
    - "C:/WebTrerm/web_ui/routing.py"
    - "C:/WebTrerm/servers/routing.py"
    - "C:/WebTrerm/studio/routing.py"
    - "C:/WebTrerm/ai-server-terminal-main/src/App.tsx"
    - "C:/WebTrerm/ai-server-terminal-main/src/lib/api.ts"

artifact_storage:
  recommendation: "Разделить артефакты между GitHub и Notion, а канонический тест-план хранить в GitHub."
  github:
    role: "Источник правды для versioned QA-артефактов и автотестов."
    store:
      - "Файл плана: tests/qa_master_plan.yaml"
      - "Pytest/Vitest/Playwright тесты и фикстуры"
      - "CI artifacts: junit xml, coverage xml/html, Playwright report, traces, screenshots, videos"
      - "Контракты API, seed-скрипты и mock fixtures"
      - "Release smoke checklist в репозитории или в GitHub Issues/Projects"
    why:
      - "Ревьюится вместе с кодом"
      - "История изменений прозрачна"
      - "Удобно связывать тест-кейсы с PR, bugfix и автотестами"
  notion:
    role: "Операционный слой для ручного прогона, UAT и release coordination."
    store:
      - "Тест-раны по сборке и релизу"
      - "Exploratory charters и notes"
      - "Bug triage / QA board"
      - "UAT sign-off"
      - "Manual evidence links на видео, скриншоты, логи из GitHub artifacts"
    why:
      - "Удобен для статусов, владельцев, сроков и синхронизации с продуктовой командой"
  decision:
    canonical_plan: "GitHub"
    execution_journal: "Notion"
    defect_tracking: "GitHub Issues или существующий баг-трекер; в Notion только обзорный статус"

priority_model:
  smoke:
    definition: "Минимальный набор критичных сценариев, который должен подтверждать жизнеспособность продукта после каждой поставки."
    trigger:
      - "Каждый PR в main/release ветку"
      - "Каждый деплой в stage/prod"
      - "Перед демо, UAT и hotfix release"
    release_gate:
      - "Все smoke тесты зелёные"
      - "Нет blocker/critical дефектов в smoke scope"
  regression:
    definition: "Расширенный функциональный, интеграционный и edge-case набор для подтверждения, что изменения не ломают смежные области."
    trigger:
      - "Перед релизом"
      - "После крупных изменений в auth, terminal, studio, integrations"
      - "По итогам incident/postmortem"
    release_gate:
      - "Все обязательные regression suite для изменённого домена зелёные"
      - "Открытые дефекты не блокируют заявленный сценарий использования"

tooling:
  auto:
    ui_e2e:
      tool: "Playwright"
      scope:
        - "Маршрутизация SPA"
        - "Основные пользовательские потоки"
        - "Navigation, auth, studio, terminal shell, visual/a11y smoke"
    frontend_component:
      tool: "Vitest + Testing Library"
      scope:
        - "Сложные состояния страниц и компонентов"
        - "Локальная логика редакторов, форм и таблиц"
    backend_api:
      tool: "pytest + django test client + pytest-asyncio"
      scope:
        - "REST API"
        - "Policy/unit tests"
        - "Desktop API"
        - "Management command tests"
    websocket:
      tool: "pytest + channels/websocket communicators"
      scope:
        - "SSH/RDP/agent/pipeline live channels"
    cli:
      tool: "pytest invoking Django management commands"
      scope:
        - "run_monitor"
        - "run_scheduled_pipelines"
        - "seed/scaffold/validate/setup commands"
  manual:
    scope:
      - "RDP visual fidelity и интерактивность"
      - "Реальные SSH/RDP соединения против тестового стенда"
      - "SMTP/Telegram внешний delivery"
      - "Domain SSO через реальный reverse proxy"
      - "Long-run monitoring/scheduler behavior"
      - "Exploratory mobile/responsive UX"

release_checklist:
  entry_criteria:
    - "Собрана тестовая сборка backend + frontend"
    - "Применены миграции"
    - "Подготовлены тестовые пользователи: admin, staff, restricted user, shared user"
    - "Есть хотя бы один SSH server, один RDP server, одна server group, один pipeline, один MCP server"
    - "Заведены значения для smoke-интеграций или их controllable mocks"
  smoke_checklist:
    - "Auth flow работает: login, session, logout, ws-token"
    - "SPA открывает /servers, /dashboard, /studio, /settings с корректным feature gating"
    - "Servers bootstrap и server CRUD не сломаны"
    - "SSH terminal page и ws-ticket открываются"
    - "Pipeline list/run/detail/live updates работают"
    - "MCP list/test/tools доступны для admin"
    - "Notifications settings сохраняются"
    - "Desktop API login/me/server create/ws-ticket работают"
    - "Нет backend 500 и критичных console errors"
  regression_exit_criteria:
    - "Smoke pass rate 100%"
    - "Regression pass rate по изменённым доменам не ниже согласованного порога"
    - "Blocker и critical дефекты закрыты или formally accepted"
    - "Все артефакты приложены: CI reports, manual evidence, bug links, sign-off"

current_automation_baseline:
  pytest_backend:
    - "tests/test_core_ui_api_smoke.py"
    - "tests/test_servers_api_smoke.py"
    - "tests/test_studio_api_smoke.py"
    - "tests/test_desktop_api.py"
    - "tests/test_channel_layer_health.py"
    - "tests/test_agent_and_pipeline_policy_enforcement.py"
    - "tests/test_tools_and_policy_units.py"
    - "tests/test_llm_runtime_unit.py"
    - "tests/test_ssh_host_keys.py"
  frontend_component:
    - "ai-server-terminal-main/src/pages/Servers.test.tsx"
  playwright_e2e:
    - "ai-server-terminal-main/e2e/smoke.spec.ts"
    - "ai-server-terminal-main/e2e/auth.spec.ts"
    - "ai-server-terminal-main/e2e/navigation.spec.ts"
    - "ai-server-terminal-main/e2e/servers.spec.ts"
    - "ai-server-terminal-main/e2e/terminal.spec.ts"
    - "ai-server-terminal-main/e2e/agents.spec.ts"
    - "ai-server-terminal-main/e2e/studio.spec.ts"
    - "ai-server-terminal-main/e2e/pipeline-live.spec.ts"
    - "ai-server-terminal-main/e2e/settings.spec.ts"
    - "ai-server-terminal-main/e2e/a11y.spec.ts"
    - "ai-server-terminal-main/e2e/visual.spec.ts"
  observed_strengths:
    - "Есть базовый smoke на core_ui, servers, studio и desktop API"
    - "Есть Playwright-контур для основных SPA-разделов"
    - "Есть unit/policy coverage для MCP/skills/runtime guardrails"
  observed_gaps:
    - "Нет явного полного покрытия Linux UI endpoints, file manager и RDP"
    - "Нет отдельного системного CLI regression на management commands"
    - "Domain SSO и multi-backend config покрыты недостаточно"
    - "Нет явного автотеста на WebSocket consumers для terminal/RDP/pipeline live"
    - "Нет полной матрицы edge cases по network failures, retries, limits, permission boundaries"

coverage_strategy:
  principle:
    - "Smoke закрывает только маршруты и критические транзакции продукта"
    - "Regression закрывает все CRUD, live flows, integrations, permission boundaries и error handling"
    - "Для всего, что связано с сетью и внешними провайдерами, комбинировать mocked auto + limited manual live check"
  environments:
    - "Local SQLite + InMemoryChannelLayer"
    - "Stage PostgreSQL + Redis"
    - "Mocked SMTP/Telegram/MCP/SSH"
    - "Optional live sandbox for SSH/RDP/Keycloak"

test_suites:
  - suite: "Authentication, session, access"
    cases:
      - id: "AUTH-001"
        priority: ["smoke", "regression"]
        surface: ["UI", "API"]
        tool: "auto"
        automation_target: "existing"
        scenario: "Анонимный пользователь пытается открыть защищённый SPA route"
        preconditions:
          - "Пользователь не авторизован"
        steps:
          - "Открыть /servers"
          - "Проверить redirect на /login?next="
        expected:
          - "Пользователь отправлен на login flow"
          - "После успешного логина возвращается на исходный маршрут"
        acceptance_criteria:
          - "Redirect стабилен для /servers, /dashboard, /studio, /settings"
          - "Нет белого экрана и console errors"

      - id: "AUTH-002"
        priority: ["smoke", "regression"]
        surface: ["API"]
        tool: "auto"
        automation_target: "existing"
        scenario: "Login / session / ws-token / logout happy path"
        preconditions:
          - "Существует активный пользователь"
        steps:
          - "POST /api/auth/login/"
          - "GET /api/auth/session/"
          - "GET /api/auth/ws-token/"
          - "POST /api/auth/logout/"
        expected:
          - "Login и logout успешны"
          - "session отражает authenticated true/false"
          - "ws-token выдаётся только для аутентифицированного пользователя"
        acceptance_criteria:
          - "HTTP коды и JSON schema стабильны"
          - "Cookie/session корректно создаются и очищаются"

      - id: "AUTH-003"
        priority: ["regression"]
        surface: ["API"]
        tool: "auto"
        automation_target: "existing"
        scenario: "CSRF enforced на login/logout и mutation endpoints"
        preconditions:
          - "Client с включённой CSRF enforcement"
        steps:
          - "Повторить login/logout без csrf token"
          - "Повторить login/logout с csrf token"
        expected:
          - "Без токена приходит 403"
          - "С токеном запрос проходит"
        acceptance_criteria:
          - "CSRF одинаково работает для core_ui, servers, studio mutations"

      - id: "AUTH-004"
        priority: ["smoke", "regression"]
        surface: ["UI", "API"]
        tool: "auto"
        automation_target: "add"
        scenario: "FeatureGate ограничивает разделы по UserAppPermission"
        preconditions:
          - "Есть restricted user без dashboard/studio/settings"
        steps:
          - "Залогиниться restricted user"
          - "Открыть /dashboard, /studio, /settings"
        expected:
          - "Пользователь редиректится на /servers"
          - "Недоступные пункты не дают рабочий вход"
        acceptance_criteria:
          - "Нет обхода через прямой route"
          - "Сессия не теряется"

      - id: "AUTH-005"
        priority: ["regression"]
        surface: ["API", "Integration"]
        tool: "manual"
        automation_target: "later"
        scenario: "Domain SSO auto-login через trusted header"
        preconditions:
          - "Включён DOMAIN_AUTH_ENABLED"
          - "Reverse proxy пробрасывает корректный header"
        steps:
          - "Отправить запрос без локальной сессии, но с trusted identity header"
          - "Повторить для существующего и нового пользователя"
        expected:
          - "Пользователь автоматически логинится"
          - "При auto-create создаётся локальный user и применяются feature permissions"
        acceptance_criteria:
          - "Работают alias headers"
          - "Некорректные значения не приводят к созданию мусорных username"

      - id: "AUTH-006"
        priority: ["regression"]
        surface: ["API"]
        tool: "auto"
        automation_target: "add"
        scenario: "Session API корректно возвращает feature map и данные пользователя"
        preconditions:
          - "Есть user с кастомным набором прав"
        steps:
          - "GET /api/auth/session/"
        expected:
          - "JSON содержит authenticated, user, features"
          - "Feature map совпадает с backend permission model"
        acceptance_criteria:
          - "Frontend gates могут полностью полагаться на ответ session endpoint"

      - id: "AUTH-007"
        priority: ["regression"]
        surface: ["API"]
        tool: "auto"
        automation_target: "add"
        scenario: "Неверные credentials не ломают auth flow"
        preconditions:
          - "Существует пользователь"
        steps:
          - "Отправить login с неверным паролем"
        expected:
          - "Возвращается controlled error без 500"
          - "Сессия не создаётся"
        acceptance_criteria:
          - "Ошибка пригодна для UI"
          - "Не раскрываются лишние детали"

  - suite: "Admin, settings, access management"
    cases:
      - id: "SET-001"
        priority: ["smoke", "regression"]
        surface: ["API"]
        tool: "auto"
        automation_target: "existing"
        scenario: "Staff user открывает admin dashboard и activity endpoints"
        preconditions:
          - "Есть staff user"
        steps:
          - "GET /api/admin/dashboard/"
          - "GET /api/admin/users/activity/"
          - "GET /api/admin/users/sessions/"
        expected:
          - "Все endpoints отвечают success"
        acceptance_criteria:
          - "Нет деградации админских агрегатов"

      - id: "SET-002"
        priority: ["regression"]
        surface: ["API"]
        tool: "auto"
        automation_target: "existing"
        scenario: "Только admin может менять audit/settings"
        preconditions:
          - "Есть non-staff user с feature settings"
        steps:
          - "GET /api/settings/activity/"
          - "POST /api/settings/"
        expected:
          - "Обе операции запрещены"
        acceptance_criteria:
          - "403 и объяснимое сообщение об ошибке"

      - id: "SET-003"
        priority: ["smoke", "regression"]
        surface: ["API"]
        tool: "auto"
        automation_target: "existing"
        scenario: "Users CRUD через access API"
        preconditions:
          - "Есть admin"
        steps:
          - "List users"
          - "Create user"
          - "Get detail"
          - "Update user"
          - "Change password"
          - "Update profile"
        expected:
          - "Все изменения отражаются в detail/list"
        acceptance_criteria:
          - "User management пригоден для settings UI"

      - id: "SET-004"
        priority: ["regression"]
        surface: ["API"]
        tool: "auto"
        automation_target: "existing"
        scenario: "Groups CRUD и membership flow"
        preconditions:
          - "Есть admin и несколько пользователей"
        steps:
          - "Create group"
          - "Update group"
          - "Add/remove members"
          - "Delete group"
        expected:
          - "Membership и group detail синхронизированы"
        acceptance_criteria:
          - "Нет orphan memberships"

      - id: "SET-005"
        priority: ["regression"]
        surface: ["API"]
        tool: "auto"
        automation_target: "existing"
        scenario: "Permissions и group-permissions CRUD"
        preconditions:
          - "Есть admin"
        steps:
          - "List permissions"
          - "Assign/update/revoke user and group permissions"
        expected:
          - "Feature flags сразу отражаются на session/access behavior"
        acceptance_criteria:
          - "Изменения прав не требуют ручной правки БД"

      - id: "SET-006"
        priority: ["regression"]
        surface: ["UI"]
        tool: "auto"
        automation_target: "add"
        scenario: "SPA settings pages показывают корректные таблицы и формы"
        preconditions:
          - "Есть admin user"
        steps:
          - "Открыть /settings, /settings/users, /settings/groups, /settings/permissions"
          - "Провести одно изменение через UI"
        expected:
          - "Данные загружаются"
          - "Сохранение проходит и UI refresh не ломается"
        acceptance_criteria:
          - "Settings UI соответствует API-контракту"

      - id: "SET-007"
        priority: ["regression"]
        surface: ["API", "Integration"]
        tool: "auto"
        automation_target: "add"
        scenario: "RequestAuditMiddleware прокидывает request id в response/header/log"
        preconditions:
          - "Аудит включён"
        steps:
          - "Вызвать API с HTTP_X_REQUEST_ID"
        expected:
          - "Response содержит тот же X-Request-ID"
          - "Activity log сохраняет request id"
        acceptance_criteria:
          - "Сквозная трассировка не теряется"

  - suite: "Desktop API"
    cases:
      - id: "DAPI-001"
        priority: ["smoke", "regression"]
        surface: ["API"]
        tool: "auto"
        automation_target: "existing"
        scenario: "Desktop auth login -> me -> refresh -> logout"
        preconditions:
          - "Есть desktop user"
        steps:
          - "POST /api/desktop/v1/auth/login/"
          - "GET /api/desktop/v1/auth/me/"
          - "POST /api/desktop/v1/auth/refresh/"
          - "POST /api/desktop/v1/auth/logout/"
        expected:
          - "Bearer flow работает"
          - "Access/refresh token life cycle корректен"
        acceptance_criteria:
          - "Desktop client может устойчиво поддерживать сессию"

      - id: "DAPI-002"
        priority: ["smoke", "regression"]
        surface: ["API"]
        tool: "auto"
        automation_target: "existing"
        scenario: "Desktop create server c managed secret"
        preconditions:
          - "Есть desktop user"
        steps:
          - "POST /api/desktop/v1/servers/ с password"
          - "GET detail"
        expected:
          - "Plaintext password не уходит в ответ"
          - "Secret сохраняется как managed secret"
        acceptance_criteria:
          - "Секреты не торчат в JSON/logs"

      - id: "DAPI-003"
        priority: ["regression"]
        surface: ["API"]
        tool: "auto"
        automation_target: "existing"
        scenario: "Desktop MCP create/detail hides secret_env values"
        preconditions:
          - "Есть staff desktop user"
        steps:
          - "POST /api/desktop/v1/mcp/"
          - "GET /api/desktop/v1/mcp/{id}/"
        expected:
          - "Ответ содержит только secret_env_keys"
          - "Реальные токены доступны только из managed secret storage"
        acceptance_criteria:
          - "Secret masking работает на collection и detail"

      - id: "DAPI-004"
        priority: ["smoke", "regression"]
        surface: ["API", "WS"]
        tool: "auto"
        automation_target: "existing"
        scenario: "Desktop terminal ws-ticket создаётся по bearer auth"
        preconditions:
          - "Есть desktop user и доступный server"
        steps:
          - "POST /api/desktop/v1/terminal/ws-ticket/"
        expected:
          - "Ответ содержит server_id, ws_token и ws path"
        acceptance_criteria:
          - "Desktop terminal может открыть websocket без cookie auth"

      - id: "DAPI-005"
        priority: ["regression"]
        surface: ["API"]
        tool: "auto"
        automation_target: "add"
        scenario: "Desktop bootstrap, groups and context endpoints"
        preconditions:
          - "Есть группы и контексты"
        steps:
          - "GET /api/desktop/v1/bootstrap/"
          - "GET /api/desktop/v1/servers/groups/"
          - "GET global/group context endpoints"
        expected:
          - "Desktop получает полный read model для навигации"
        acceptance_criteria:
          - "Нет расхождения с web bootstrap"

      - id: "DAPI-006"
        priority: ["regression"]
        surface: ["API"]
        tool: "auto"
        automation_target: "existing"
        scenario: "Shared server detail не раскрывает owner context и secret shared user"
        preconditions:
          - "Есть shared server с share_context false"
        steps:
          - "GET /api/desktop/v1/servers/{id}/"
        expected:
          - "notes, corporate_context, network_config и has_saved_secret ограничены"
        acceptance_criteria:
          - "Shared access соблюдает privacy boundaries"

  - suite: "Servers inventory, groups, sharing, knowledge"
    cases:
      - id: "SRV-001"
        priority: ["smoke", "regression"]
        surface: ["UI", "API"]
        tool: "auto"
        automation_target: "existing"
        scenario: "Servers bootstrap и список инфраструктуры"
        preconditions:
          - "Есть серверы и группы"
        steps:
          - "GET /servers/api/frontend/bootstrap/"
          - "Открыть /servers"
        expected:
          - "Список серверов, групп и stats отображается"
        acceptance_criteria:
          - "Главный экран продукта функционален"

      - id: "SRV-002"
        priority: ["smoke", "regression"]
        surface: ["API"]
        tool: "auto"
        automation_target: "existing"
        scenario: "Server group CRUD + add/remove member + subscribe"
        preconditions:
          - "Есть owner и teammate"
        steps:
          - "Создать группу"
          - "Обновить группу"
          - "Добавить и удалить участника"
          - "Подписаться на группу"
        expected:
          - "Все group actions успешны"
        acceptance_criteria:
          - "Group management поддерживает team workflow"

      - id: "SRV-003"
        priority: ["smoke", "regression"]
        surface: ["API"]
        tool: "auto"
        automation_target: "existing"
        scenario: "Server CRUD + bulk update"
        preconditions:
          - "Есть owner"
        steps:
          - "Создать server"
          - "Получить detail"
          - "Обновить server"
          - "Сделать bulk update"
          - "Удалить server"
        expected:
          - "Server lifecycle работает end-to-end"
        acceptance_criteria:
          - "Frontend form может опираться на эти endpoints без ручных workaround"

      - id: "SRV-004"
        priority: ["regression"]
        surface: ["API"]
        tool: "auto"
        automation_target: "existing"
        scenario: "Global context и group context CRUD"
        preconditions:
          - "Есть группа"
        steps:
          - "Сохранить global rules"
          - "Прочитать global rules"
          - "Сохранить group override"
          - "Прочитать group override"
        expected:
          - "Контекст сохраняется и возвращается без потери структуры"
        acceptance_criteria:
          - "Rules, forbidden_commands и env vars устойчивы"

      - id: "SRV-005"
        priority: ["regression"]
        surface: ["UI"]
